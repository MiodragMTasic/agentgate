version: "1"

defaults:
  verdict: deny
  audit: true
  rateLimit:
    maxRequests: 60
    window: 1m
    scope: identity

roles:
  # Tiered role system
  free_user:
    description: Free-tier agent with limited access
  pro_user:
    description: Pro-tier agent with expanded access
    inherits:
      - free_user
  enterprise_user:
    description: Enterprise agent with full access
    inherits:
      - pro_user
  internal_agent:
    description: Internal system agent with elevated permissions
    inherits:
      - enterprise_user

# Reusable named conditions
conditions:
  pricing_window:
    time:
      days: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
      hours:
        after: "00:00"
        before: "23:59"
      timezone: America/New_York
  large_price_change:
    expression: "Math.abs(params.changePercent) > 10"

tools:
  # ── Read-only tools (all tiers) ──────────────────────────────────

  search_products:
    allow:
      - roles: [free_user, pro_user, enterprise_user, internal_agent]
        params:
          query:
            maxLength: 500
          limit:
            max: 100
    rateLimit:
      maxRequests: 100
      window: 1m
      scope: identity:tool

  get_order_status:
    allow:
      - roles: [free_user, pro_user, enterprise_user, internal_agent]
        params:
          orderId:
            pattern: "^ORD-[0-9]{4}-[A-Z0-9]+$"

  get_customer_profile:
    allow:
      - roles: [pro_user, enterprise_user, internal_agent]
        params:
          fields:
            # Free users can't access sensitive fields
            notContains: ["ssn", "creditCard", "bankAccount"]

  # ── Write tools (pro+ tiers) ─────────────────────────────────────

  update_order:
    allow:
      - roles: [pro_user, enterprise_user, internal_agent]
        params:
          status:
            enum: ["processing", "shipped", "delivered", "returned"]
    rateLimit:
      maxRequests: 20
      window: 1m
      scope: identity:tool
    cost: 0.10
    budget:
      perUser:
        hourly: 5.00
        daily: 50.00
        monthly: 500.00

  send_notification:
    allow:
      - roles: [pro_user, enterprise_user, internal_agent]
        params:
          channel:
            enum: ["email", "sms", "push"]
          # SMS costs more
    rateLimit:
      maxRequests: 10
      window: 1h
      scope: identity:tool
    cost:
      base: 0.05
      perParam:
        channel:
          perUnit: 0.10
          unit: sms

  # ── Admin tools (enterprise+) ────────────────────────────────────

  create_discount_code:
    allow:
      - roles: [enterprise_user, internal_agent]
        params:
          percentage:
            max: 50
          maxUses:
            max: 1000
    cost: 0.50
    budget:
      perUser:
        daily: 25.00
        monthly: 200.00

  modify_pricing:
    allow:
      - roles: [enterprise_user, internal_agent]
        conditions:
          pricing_window: {}
        params:
          changePercent:
            min: -20
            max: 20
    requireApproval:
      when:
        conditions:
          large_price_change: {}
      approvers: [pricing_manager]
      timeout: 30m
      timeoutAction: deny
      message: "Price change exceeding 10% requires manager approval"
    cost: 1.00
    budget:
      perUser:
        daily: 50.00

  # ── System tools (internal only) ─────────────────────────────────

  execute_migration:
    allow:
      - roles: [internal_agent]
    requireApproval:
      when:
        roles: [internal_agent]
      approvers: [devops_lead]
      timeout: 1h
      timeoutAction: deny
      message: "Database migration requires DevOps approval"

  purge_cache:
    allow:
      - roles: [internal_agent]
        params:
          scope:
            enum: ["product", "user", "order", "all"]
    rateLimit:
      maxRequests: 5
      window: 1h
      scope: global

  access_logs:
    allow:
      - roles: [internal_agent]
        params:
          timeRange:
            maxLength: 20
          level:
            enum: ["info", "warn", "error"]
    rateLimit:
      maxRequests: 30
      window: 1m
